# =============================================================================
# 前置机部署 — 数据源
# -----------------------------------------------------------------------------
# SPD：前置机场景下若仅连 SCM 云端库，保持 enabled=false。
# SCM：前置机需能解析并访问阿里云 RDS（安全组/白名单放行本前置机出口 IP）。
# -----------------------------------------------------------------------------
# 网络清单（与 application.yml 中 HTTP 8088 并列）
#   数据源              主机 / 说明                                   端口
#   ------------------   ------------------------------------------   -----
#   SCM MySQL（启用）    rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com 3306
#   SPD MySQL（未启用）  localhost（本地联调时可改 enabled 与 url）     3306
# =============================================================================
# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 说明：
            # - spd/scm 都可独立启停
            # - 当 spd.enabled=false 且 scm.enabled=false 时，系统将以“无数据库模式”启动
            #   仅用于接口调用/被调用，不可执行任何数据库读写
            # SPD 数据源
            spd:
                enabled: false
                url: jdbc:mysql://localhost:3306/aspt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: root
                password: root
                # url: jdbc:mysql://rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com:3306/aspt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                # username: spd
                # password: Spd@456ww
                driver-class-name: com.mysql.cj.jdbc.Driver
            # SCM 数据源（前置机出网访问云端 RDS；库名 scm）
            scm:
                enabled: false
                url: jdbc:mysql://rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com:3306/scm?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: spd
                password: Spd@456ww
                driver-class-name: com.mysql.cj.jdbc.Driver
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时间
            maxWait: 60000
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter: 
                enabled: true
            statViewServlet:
                enabled: true
                # 前置机建议填运维网段或 127.0.0.1；不填则允许所有访问（仅内网前置机时可接受）
                allow:
                url-pattern: /druid/*
                # 控制台管理用户名和密码
                login-username: scminterface
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    # 关闭 SQL 合并解析；merge-sql=true 时 Druid 会解析整条 SQL，CREATE PROCEDURE 体内含 SIGNAL 等会报错（merge sql error）
                    merge-sql: false
                wall:
                    config:
                        multi-statement-allow: true

