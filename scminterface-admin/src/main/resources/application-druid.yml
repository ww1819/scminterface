# =============================================================================
# 前置机部署 — 数据源（spd / scm 独立启停，以 enabled 为准，勿与下方注释场景搞反）
# -----------------------------------------------------------------------------
# 场景 A — 仅连云端 SCM（不连院内 SPD）：
#   spd.enabled=false，scm.enabled=true；url 指向 RDS，白名单放行前置机出口 IP。
# 场景 B — 仅连院内 SPD（不连云端 SCM，常见衡水前置机）：
#   spd.enabled=true，scm.enabled=false；url 指向院内 aspt（如 192.168.3.75）。
# 场景 C — 两库都关：spd/scm 均为 false → 无数据库模式，仅 HTTP 接口。
# -----------------------------------------------------------------------------
# 网络清单（与 application.yml 中 HTTP 8088 并列；哪条启用以 enabled 为准）
#   数据源              主机 / 说明                                   端口
#   ------------------   ------------------------------------------   -----
#   SCM MySQL            rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com 3306
#   SPD MySQL            院内库或 localhost（本地联调）                 3306
# =============================================================================
# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        druid:
            # 说明：
            # - spd/scm 都可独立启停
            # - 当 spd.enabled=false 且 scm.enabled=false 时，系统将以“无数据库模式”启动
            #   仅用于接口调用/被调用，不可执行任何数据库读写
            # SPD 数据源
            spd:
                enabled: true
                url: jdbc:mysql://localhost:3306/aspt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: root
                password: root
                # url: jdbc:mysql://rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com:3306/aspt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                # username: spd
                # password: Spd@456ww
                # enabled: true
                # url: jdbc:mysql://192.168.3.75:3306/aspt?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                # username: root
                # password: hssy_2018
                driver-class-name: com.mysql.cj.jdbc.Driver
            # SCM 数据源（前置机出网访问云端 RDS；库名 scm）
            # enabled=false 时不会注册 scmDataSource，也不会执行 scminterface.scm.schema.bootstrap 脚本
            scm:
                enabled: false
                url: jdbc:mysql://rm-bp1tov1b3948fc5inbo.mysql.rds.aliyuncs.com:3306/scm?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
                username: spd
                password: Spd@456ww
                driver-class-name: com.mysql.cj.jdbc.Driver
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时间
            maxWait: 60000
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter: 
                enabled: true
            statViewServlet:
                enabled: true
                # 前置机建议填运维网段或 127.0.0.1；不填则允许所有访问（仅内网前置机时可接受）
                allow:
                url-pattern: /druid/*
                # 控制台管理用户名和密码
                login-username: scminterface
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    slow-sql-millis: 1000
                    # 关闭 SQL 合并解析；merge-sql=true 时 Druid 会解析整条 SQL，CREATE PROCEDURE 体内含 SIGNAL 等会报错（merge sql error）
                    merge-sql: false
                wall:
                    config:
                        multi-statement-allow: true

