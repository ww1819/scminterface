# =============================================================================
# 前置机部署说明
# -----------------------------------------------------------------------------
# 本 profile 假定 scminterface 部署在医院/机构侧前置机，对外提供 HTTP 服务，
# 并通过可出网或专线访问云端 SCM 库（MySQL RDS）。
# -----------------------------------------------------------------------------
# 网络清单（IP 与端口，请按实际前置机与 RDS 白名单核对）
#   组件                 地址 / 主机                         端口    说明
#   ------------------   ----------------------------------   -----   ------------------
#   本服务 HTTP          0.0.0.0（监听）/ 前置机业务网卡 IP     8088    见 server.port
#   对外回调/公网配置    http://106.53.83.190                 8088    scminterface.public.interface.url
#   Swagger 开发前缀     同上基址                             8088    pathMapping: /dev-api
#   SCM MySQL（阿里云）  rm-bp1tov1b3948fc5inbo.mysql.rds...   3306    见 application-druid.yml
#   Druid 监控页         同上本服务基址                       8088    路径 /druid/*
# =============================================================================
# Spring配置
spring:
  profiles:
    active: druid
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB

# 项目相关配置
scminterface:
  # 名称
  name: Scminterface
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2025
  # 实例演示开关
  demoEnabled: true
  # 前置机对外的 interface 基址（与前置机可被回调/访问的 IP 及 server.port 一致）
  public:
    interface:
      url: http://106.53.83.190:8088
  # SCM 库结构补全：仅当 spring.datasource.druid.scm.enabled=true 且本项为 true 时执行 sql/mysql/scm/*.sql
  scm:
    schema:
      bootstrap: false
      # 某段 SQL 失败时是否中止启动（false 仅打日志，便于联调）
      fail-on-error: false
  # 众阳 HIS 厂家 — 各医院客户独立配置（凭证见各医院 *MsunEnvProfile.java）
  vendor:
    msun:
      # 查询接口回参落镜像库（探针页与正式 API 共用）；须同时启用 spring.datasource.druid.msun-his-mirror
      mirror:
        enabled: true
      hospitals:
        # 枣强县中医院（zaoqiang-tcm-001）
        zaoqiang-tcm-001:
          enabled: true
          # prod=枣强正式 https://zqxzyyy.msuncloud.cn；联调灰度可改 test
          active-env: prod
          depts-path: /msun-middle-base-common/v1/depts
          identities-path: /msun-middle-base-common/v1/identities

# 前置机服务端口（与 public.interface.url 端口保持一致）
server:
  # 前置机监听所有网卡，便于院内网或其它系统访问本机业务端口
  address: 0.0.0.0
  # 服务器的HTTP端口
  port: 8088
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 住院/门诊收费同步等长耗时任务（手动触发或 HTTP 调用）
    connection-timeout: 300000
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.scminterface: debug
    org.springframework: warn

# MyBatis
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.scminterface.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认120分钟，即2小时）
  expireTime: 120

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

